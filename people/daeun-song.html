<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daeun Song — AIR Lab @ Ewha</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/symbols/ewha.png">
<link rel="stylesheet" href="../styles/style.css?v=2">
<style>
  /* Larger photo on dedicated profile page */
  .pi-block { grid-template-columns: 200px 1fr !important; border-bottom: none !important; margin-bottom: 0 !important; }
  .pi-photo-slot { width: 200px !important; height: 240px !important; }
  @media (max-width: 768px) {
    .pi-block { grid-template-columns: 140px 1fr !important; }
    .pi-photo-slot { width: 140px !important; height: 168px !important; }
  }
  @media (max-width: 400px) {
    .pi-block { grid-template-columns: 1fr !important; }
    .pi-photo-slot { width: 120px !important; height: 144px !important; }
  }

  .pi-bio { padding-top: .75rem !important; text-align: justify; }

</style>
</head>
<body>

<nav id="topnav">
  <div class="nav-inner">
    <div class="nav-brand">
      <a href="/" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;">
        <span class="nav-name"><span>AIR Lab @ Ewha</span></span>
      </a>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="/"              class="nav-btn">Home</a></li>
      <li><a href="/#members"      class="nav-btn active">Members</a></li>
      <li><a href="/#publications" class="nav-btn">Publications</a></li>
      <li><a href="/#news"         class="nav-btn">News</a></li>
    </ul>
    <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main id="page-content"></main>

<footer class="site-ft" id="site-footer"></footer>

<script src="../data/lab.js?v=2"></script>
<script src="../data/members.js?v=3"></script>
<script>
'use strict';

const PHOTO_SVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="200" fill="#e8e8e6"/><circle cx="100" cy="75" r="35" fill="#c8c8c5"/><ellipse cx="100" cy="185" rx="65" ry="50" fill="#c8c8c5"/></svg>`;

function toggleMobileNav() {
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}

function renderFooter() {
  document.getElementById('site-footer').innerHTML = `
    <div class="ft-inner">
      <div>
        <div class="ft-brand">${LAB_INFO.full_name}</div>
        <div class="ft-uni">${LAB_INFO.department}<br>${LAB_INFO.university}</div>
      </div>
      <div>
        <div class="ft-uni">${(Array.isArray(LAB_INFO.address) ? LAB_INFO.address.join('<br>') : LAB_INFO.address)}<br>${LAB_INFO.phone}</div>
      </div>
    </div>
    <div class="ft-bottom"><span>&copy; ${LAB_INFO.copyright_year} AIR Lab, Ewha Womans University</span></div>`;
}

function renderProfile() {
  const pi = MEMBERS_DATA.pi;

  const piPhoto = pi.photo
    ? `<img src="../${pi.photo}" alt="${pi.name}">`
    : PHOTO_SVG;

  const piLinks = (pi.links || []).map(l =>
    `<a href="${l.url}" class="pi-link" target="_blank" rel="noopener">${l.label}</a>`
  ).join('');

  // const eduHtml = pi.education && pi.education.length
  //   ? `<div class="pi-bio-section">
  //       <span class="pi-bio-label">Education</span>
  //       <ul>${pi.education.map(e =>
  //         `<li>${e.degree}, ${e.field}, ${e.school}${e.year ? ', ' + e.year : ''}</li>`
  //       ).join('')}</ul>
  //     </div>` : '';
  const eduHtml = '';

  const expHtml = pi.experience && pi.experience.length
    ? `<div class="pi-bio-section">
        <span class="pi-bio-label">Professional Experience</span>
        <ul>${pi.experience.map(e => {
          const labHtml = e.lab ? (e.org_url ? `<a href="${e.org_url}" class="pi-bio-link" target="_blank" rel="noopener">${e.lab}</a>` : e.lab) : '';
          const orgHtml = labHtml ? (e.uni ? labHtml + ', ' + e.uni : labHtml) : (e.org || e.uni || '');
          return `<li>${e.role}, ${orgHtml}${e.period ? ` <span class="pi-bio-sub">(${e.period})</span>` : ''}</li>`;
        }).join('')}</ul>
      </div>` : '';

  document.getElementById('page-content').innerHTML = `
    <div class="page-hd">
      <div class="wrap">
        <h1>${pi.name}</h1>
        <div class="page-sub">${pi.role}</div>
      </div>
    </div>
    <div class="mem-body"><div class="wrap">
      <div class="pi-block">
        <div class="photo-slot pi-photo-slot">${piPhoto}</div>
        <div>
          <div class="pi-bio">${pi.bio || ''}</div>
          ${pi.email ? `<div class="pi-meta" style="margin-bottom:.75rem;"><span><strong>Contact:</strong> <a href="mailto:${pi.email}" style="color:var(--ink3);text-decoration:none;">${pi.email}</a></span></div>` : ''}
          <div class="pi-links">${piLinks}</div>
        </div>
      </div>
      ${expHtml}
    </div></div>`;
}

window.addEventListener('DOMContentLoaded', () => {
  renderFooter();
  renderProfile();
});
</script>

</body>
</html>
